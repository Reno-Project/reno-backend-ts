# Build once, deploy to both RENO and EGP backends from the development branch
name: Build and deploy Node.js app to Azure - RENO + EGP

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # Deploy the SAME artifact to both targets in parallel.
    # fail-fast: false => ako jedan deploy pukne, drugi svejedno ide do kraja.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: reno
            app-name: 'reno-ts-test-backend'
            publish-profile-secret: 'AZUREAPPSERVICE_PUBLISHPROFILE_058BE2BCBCB44103AFECDD477098E0F6'
          - name: egp
            app-name: 'reno-ts-test-backend-egp'
            publish-profile-secret: 'AZUREAPPSERVICE_PUBLISHPROFILE_EGP'

    name: Deploy (${{ matrix.name }})

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App - ${{ matrix.name }}'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app-name }}
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets[matrix.publish-profile-secret] }}