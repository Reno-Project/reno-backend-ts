# Build once, deploy to both RENO and EGP production backends from main
name: Build and deploy Node.js app to Azure - PROD RENO + EGP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # required for OIDC
      contents: read

    # Isti artifact ide na oba app-a, paralelno.
    # fail-fast: false => ako jedan deploy pukne, drugi ide do kraja.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: reno
            app-name: 'reno-backend-ts-prod'
          - name: egp
            app-name: 'reno-ts-backend-egp'

    name: Deploy PROD (${{ matrix.name }})

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0BE03D93B6D54B53BD4C73CC64124B4C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CDBE7C24033F440AA27443C1453BB98F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E98C18D8799542C885E509CBF57C7533 }}

      - name: 'Deploy to Azure Web App - ${{ matrix.name }}'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app-name }}
          slot-name: 'Production'
          package: .