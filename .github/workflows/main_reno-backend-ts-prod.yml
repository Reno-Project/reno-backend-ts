# Build once, deploy to both RENO and EGP production backends from main
#
# NAPOMENA o dva razlicita metoda autentikacije:
#   RENO -> OIDC (azure/login sa service principal-om) - postojeci setup, ne diramo
#   EGP  -> publish profile - jer GitHub service principal nema RBAC dozvolu
#           na reno-ts-backend-egp, a za dodelu role treba Owner.
#   Kada neko sa Owner rolom doda service principal-u "Contributor" na EGP app,
#   moze se preci na OIDC i za EGP (obrisati publish-profile liniju + if uslove).

name: Build and deploy Node.js app to Azure - PROD RENO + EGP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # potrebno za OIDC (RENO)
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: reno
            app-name: 'reno-backend-ts-prod'
            auth: 'oidc'
          - name: egp
            app-name: 'reno-ts-backend-egp'
            auth: 'publish-profile'

    name: Deploy PROD (${{ matrix.name }})

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # --- RENO: OIDC login ---
      - name: Login to Azure (OIDC)
        if: matrix.auth == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0BE03D93B6D54B53BD4C73CC64124B4C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CDBE7C24033F440AA27443C1453BB98F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E98C18D8799542C885E509CBF57C7533 }}

      - name: 'Deploy via OIDC - ${{ matrix.name }}'
        if: matrix.auth == 'oidc'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app-name }}
          slot-name: 'Production'
          package: .

      # --- EGP: publish profile ---
      - name: 'Deploy via publish profile - ${{ matrix.name }}'
        if: matrix.auth == 'publish-profile'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app-name }}
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EGP_PROD }}